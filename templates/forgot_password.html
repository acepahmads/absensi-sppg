<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi SPPG - Lupa Password</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      height: 100%;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .main-wrapper {
      min-height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .glass-panel {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 60px rgba(59, 130, 246, 0.1);
    }

    .input-field {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(71, 85, 105, 0.5);
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
    }

    .notification-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      max-width: 90%;
      text-align: center;
      animation: slideDown 0.3s ease;
    }

    select option {
      background: #1e293b;
      color: #e2e8f0;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
    }
  </style>
  <style>[v-cloak] { display: none; }</style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
 </head>
 <body class="h-full">
  <div class="main-wrapper" id="app" v-cloak :style="{ background: 'linear-gradient(135deg, ' + (configState.background_color || '#0f172a') + ' 0%, ' + (configState.surface_color || '#1e293b') + ' 100%)' }">
   <div style="min-height: 100%; padding: 2rem 1rem; display: flex; align-items: center; justify-content: center; width: 100%;">
    <div style="width: 100%; max-width: 500px;">
     <!-- Header -->
     <div style="text-align: center; margin-bottom: 1.5rem;">
      <div style="display: inline-flex; align-items: center; gap: 0rem; margin-bottom: 0.5rem;">
       <img id="company-logo" src="/static/LOGO-CBI.png" alt="Company Logo" style="width: 150px; height: 75px; object-fit: contain;">
      </div>
      <h2 id="page-title" :style="{ fontSize: (configState.font_size || 16) * 1.25 + 'px', color: configState.text_color }" style="font-weight: 700; margin-bottom: 0.5rem;">Pemulihan Password</h2>
      <div class="divider" style="width: 100px; margin: 0 auto;"></div>
     </div>
     
     <!-- Main Panel -->
     <div class="glass-panel" style="border-radius: 1rem; padding: 2rem; width: 100%;">
      <div v-if="!isSuccess" id="form-container">
       <form id="forgot-password-form" @submit.prevent="handleReset">
        <div style="display: grid; gap: 1.25rem;">
         
         <!-- Email Field -->
         <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;">Email Terdaftar</label>
          <div style="position: relative;">
           <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #64748b;" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
           </svg>
           <input type="email" class="input-field" placeholder="Masukkan email Anda" style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;" v-model="email" required>
          </div>
         </div>

         <!-- Tenant Selection Field -->
         <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;">Perusahaan / Tenant</label>
          <div style="position: relative;">
           <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #64748b;" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
           </svg>
           <select class="input-field" style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;" v-model="selectedTenant" :disabled="tenantsLoading" required>
            <option value="" v-if="tenantsLoading">Memuat daftar perusahaan...</option>
            <option value="" v-else-if="tenantsError">Gagal memuat daftar perusahaan</option>
            <option value="" v-else>Pilih perusahaan</option>
            <option v-for="tenant in tenants" :key="tenant.id" :value="tenant.id">{{ tenant.name }}</option>
           </select>
          </div>
         </div>

         <!-- Karyawan Name Field -->
         <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;">Nama Lengkap Karyawan</label>
          <div style="position: relative;">
           <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #64748b;" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
           </svg>
           <input type="text" class="input-field" placeholder="Nama lengkap terdaftar" style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;" v-model="karyawanName" required>
          </div>
         </div>

         <!-- Divider -->
         <div class="divider" style="opacity: 0.3; margin: 0.5rem 0;"></div>

         <!-- Password Baru Field -->
         <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;">Password Baru</label>
          <div style="position: relative;">
           <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #64748b;" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
           </svg>
           <input type="password" class="input-field" placeholder="••••••••" style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;" v-model="newPassword" required>
          </div>
         </div>

         <!-- Confirm Password Baru Field -->
         <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; color: #cbd5e1; margin-bottom: 0.375rem;">Ulangi Password Baru</label>
          <div style="position: relative;">
           <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: #64748b;" fill="none" stroke="currentColor" viewbox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
           </svg>
           <input type="password" class="input-field" placeholder="••••••••" style="width: 100%; padding: 0.75rem 1rem 0.75rem 3rem; border-radius: 0.5rem; color: #e2e8f0; font-size: 1rem;" v-model="confirmPassword" required>
          </div>
          <p style="font-size: 0.875rem; margin-top: 0.375rem; color: #ef4444;" v-show="confirmPassword && !passwordsMatch">Password tidak cocok</p>
         </div>

        </div>

        <!-- Submit Button --> 
        <button type="submit" class="btn-primary" :disabled="!isFormValid || isSubmitting" style="width: 100%; padding: 0.875rem; border-radius: 0.5rem; color: white; font-weight: 600; font-size: 1.125rem; border: none; cursor: pointer; margin-top: 1.5rem;"> 
         <span>{{ isSubmitting ? 'Memproses...' : 'Ubah Password' }}</span> 
        </button>

        <!-- Back to Login -->
        <div style="text-align: center; margin-top: 1.25rem;">
         <a href="/" style="font-size: 0.875rem; color: #3b82f6; text-decoration: none; font-weight: 500;">Kembali ke Halaman Login</a>
        </div>
       </form>
      </div>

      <!-- Success Message -->
      <div v-else style="padding: 1.5rem; background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); border-radius: 0.5rem; text-align: center;">
       <svg style="width: 48px; height: 48px; margin: 0 auto 1rem; color: #22c55e;" fill="currentColor" viewbox="0 0 24 24">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" />
       </svg>
       <h4 style="font-size: 1.25rem; font-weight: 600; color: #22c55e; margin-bottom: 0.5rem;">Ubah Password Berhasil!</h4>
       <p style="color: #94a3b8; margin-bottom: 1.5rem;">Password akun Anda telah berhasil diperbarui. Silakan gunakan password baru untuk masuk.</p>
       <button @click="loginNow" style="padding: 0.75rem 2rem; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 999px; color: #ffffff; font-size: 1rem; font-weight: 600; cursor: pointer;">
        Login Sekarang
       </button>
      </div>
     </div>
    </div>
   </div>
  </div>

  <script>
    const defaultConfig = {
      background_color: "#0f172a",
      surface_color: "#1e293b",
      text_color: "#e2e8f0",
      font_family: "Inter",
      font_size: 16
    };

    // Message notification system
    function showNotification(message, type) {
      const existing = document.querySelector('.notification-message');
      if (existing) existing.remove();

      const el = document.createElement('div');
      el.className = 'notification-message';
      el.textContent = message;

      if (type === 'success') {
        el.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
        el.style.color = '#ffffff';
      } else {
        el.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
        el.style.color = '#ffffff';
      }

      document.body.appendChild(el);

      setTimeout(() => {
        el.style.animation = 'slideUp 0.3s ease';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    }

    const { createApp, ref, reactive, computed, onMounted } = Vue;

    createApp({
      setup() {
        const configState = reactive({ ...defaultConfig });
        
        // Multi-Tenant Fields
        const tenants = ref([]);
        const selectedTenant = ref('');
        const tenantsLoading = ref(true);
        const tenantsError = ref(false);

        // Form fields
        const email = ref('');
        const karyawanName = ref('');
        const newPassword = ref('');
        const confirmPassword = ref('');

        const isSubmitting = ref(false);
        const isSuccess = ref(false);

        const passwordsMatch = computed(() => {
          return newPassword.value === confirmPassword.value;
        });

        const isFormValid = computed(() => {
          return email.value.trim() && 
                 selectedTenant.value && 
                 karyawanName.value.trim() && 
                 newPassword.value.length >= 6 && 
                 passwordsMatch.value;
        });

        const loadTenants = async () => {
          tenantsLoading.value = true;
          tenantsError.value = false;
          try {
            const response = await fetch('/api/tenants');
            if (!response.ok) throw new Error();
            const data = await response.json();
            tenants.value = data || [];
            if (tenants.value.length > 0) {
              selectedTenant.value = tenants.value[0].id;
            }
            tenantsLoading.value = false;
          } catch (e) {
            tenantsError.value = true;
            tenantsLoading.value = false;
          }
        };

        const handleReset = async () => {
          if (!isFormValid.value) return;

          isSubmitting.value = true;
          try {
            const response = await fetch('/api/user/forgot-password', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                email: email.value,
                tenant_id: parseInt(selectedTenant.value),
                karyawan_name: karyawanName.value,
                new_password: newPassword.value
              })
            });

            const data = await response.json();

            if (response.ok) {
              isSuccess.value = true;
              showNotification('Password berhasil diperbarui!', 'success');
            } else {
              showNotification(data.error || 'Verifikasi gagal. Pastikan email, tenant, dan nama karyawan benar.', 'error');
            }
          } catch (e) {
            showNotification('Koneksi internet bermasalah. Hubungi server.', 'error');
            console.error(e);
          } finally {
            isSubmitting.value = false;
          }
        };

        const onConfigChange = (newConfig) => {
          Object.assign(configState, newConfig);
          const customFont = configState.font_family || defaultConfig.font_family;
          const baseFontStack = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          document.body.style.fontFamily = `${customFont}, ${baseFontStack}`;
        };

        onMounted(() => {
          loadTenants();

          if (window.elementSdk) {
            window.elementSdk.init({
              defaultConfig,
              onConfigChange,
              mapToCapabilities: (cfg) => ({
                recolorables: [
                  {
                    get: () => cfg.background_color || defaultConfig.background_color,
                    set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
                  },
                  {
                    get: () => cfg.surface_color || defaultConfig.surface_color,
                    set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
                  },
                  {
                    get: () => cfg.text_color || defaultConfig.text_color,
                    set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
                  }
                ],
                borderables: [],
                fontEditable: {
                  get: () => cfg.font_family || defaultConfig.font_family,
                  set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
                },
                fontSizeable: {
                  get: () => cfg.font_size || defaultConfig.font_size,
                  set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
                }
              }),
              mapToEditPanelValues: (cfg) => new Map([
                ["page_title", "Pemulihan Password"]
              ])
            });
          } else {
            onConfigChange(defaultConfig);
          }
        });

        const loginNow = () => {
          window.location.href = '/';
        };

        return {
          configState,
          tenants,
          selectedTenant,
          tenantsLoading,
          tenantsError,
          email,
          karyawanName,
          newPassword,
          confirmPassword,
          passwordsMatch,
          isFormValid,
          isSubmitting,
          isSuccess,
          handleReset,
          loginNow
        };
      }
    }).mount('#app');
  </script>
 </body>
</html>
