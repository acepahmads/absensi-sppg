<!doctype html>
<html lang="en" style="height: 100%;">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi SPPG - Login</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      height: 100%;
      width: 100%;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121214;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .main-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 100%;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(24, 24, 27, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(59, 130, 246, 0.25);
      padding: 40px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .brand-section {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-container {
      width: 90px;
      height: 90px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 16px auto;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      padding: 10px;
    }

    .logo-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .system-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .system-desc {
      font-size: 13px;
      line-height: 1.5;
      color: #94a3b8;
      font-weight: 400;
    }

    .form-header {
      margin-bottom: 24px;
      text-align: center;
    }

    .form-title {
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
    }

    .form-subtitle {
      font-size: 13px;
      color: #94a3b8;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      height: 44px;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: rgba(24, 24, 27, 0.5);
      padding: 0 14px;
      color: #ffffff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: #3b82f6;
      background: rgba(24, 24, 27, 0.8);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .input-field::placeholder {
      color: #64748b;
      opacity: 0.8;
    }

    .proceed-button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .proceed-button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }

    .proceed-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .proceed-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .action-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .link-item {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #3b82f6;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .link-item:hover {
      text-decoration: underline;
      color: #60a5fa;
    }

    .link-item-outline {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 42px;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      background: transparent;
    }

    .link-item-outline:hover {
      background: rgba(39, 39, 42, 0.5);
      border-color: #3b82f6;
      color: #ffffff;
    }

    .footer-text {
      margin-top: 24px;
      color: #64748b;
      font-size: 11px;
      text-align: center;
      line-height: 1.4;
    }

    .notification-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      max-width: 90%;
      text-align: center;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
    }
  </style>
  <style>[v-cloak] { display: none; }</style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
 </head>
 <body>
  <main class="main-container" id="app" v-cloak>
    
    <!-- Central Login Card with dynamic accent color border -->
    <div class="login-card" :style="{
      borderColor: (configState.accent_color || '#3b82f6') + '66',
      boxShadow: '0 8px 32px rgba(0, 0, 0, 0.4), 0 0 15px ' + (configState.accent_color || '#3b82f6') + '22'
    }">
      
      <!-- Brand/Logo Section inside card -->
      <div class="brand-section">
        <div class="logo-container">
          <img src="/static/LOGO-CBI.png" class="logo-img" alt="Logo CBI">
        </div>
        <h1 class="system-title">{{ configState.subtitle }}</h1>
      </div>

      <!-- Form Header -->
      <header class="form-header">
        <h2 class="form-title">{{ configState.main_title }}</h2>
        <p class="form-subtitle">Silakan masukkan akun Anda untuk masuk ke sistem.</p>
      </header>

      <!-- Form -->
      <form id="loginForm" @submit.prevent="handleLogin">
        
        <!-- Email / Username Input -->
        <div class="input-group">
          <label class="input-label" for="userInput">{{ configState.user_label }}</label>
          <input type="text" id="userInput" class="input-field" placeholder="nama@email.com" v-model="username" required>
        </div>
        
        <!-- Password Input -->
        <div class="input-group">
          <label class="input-label" for="passwordInput">{{ configState.password_label }}</label>
          <input type="password" id="passwordInput" class="input-field" placeholder="Masukkan password" v-model="password" required>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="proceed-button" id="proceedButton" :disabled="isSubmitting" :style="{
          background: 'linear-gradient(135deg, ' + (configState.accent_color || '#0052cc') + ' 0%, ' + (configState.accent_color || '#0066ff') + ' 100%)',
          boxShadow: '0 4px 15px ' + (configState.accent_color || '#0066ff') + '40'
        }">{{ submitText }}</button>

      </form>

      <!-- Navigation Links -->
      <div class="action-links">
        <a href="/forgot_password" class="link-item">Lupa Password?</a>
        <a href="/tenant_registration" class="link-item-outline">Daftar Dapur SPPG Baru</a>
      </div>

      <!-- Footer Text -->
      <p class="footer-text" id="footerText">{{ configState.footer_text }}</p>

    </div>
  </main>

  <script>
    const defaultConfig = {
      background_color: '#ffffff',
      panel_color: '#ffffff',
      accent_color: '#0066ff',
      text_color: '#1e293b',
      subtitle_color: '#64748b',
      main_title: 'Login',
      subtitle: 'CBI Absensi SPPG',
      user_label: 'User Identification',
      password_label: 'Access Code',
      button_text: 'Enter System',
      footer_text: 'Protected by advanced security protocols',
      font_family: 'Inter',
      font_size: 16
    };

    // Message notification system
    function showMessage(message, type) {
      const existingMsg = document.querySelector('.notification-message');
      if (existingMsg) {
        existingMsg.remove();
      }
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'notification-message';
      msgDiv.textContent = message;
      
      if (type === 'success') {
        msgDiv.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
        msgDiv.style.color = '#ffffff';
      } else {
        msgDiv.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
        msgDiv.style.color = '#ffffff';
      }
      
      document.body.appendChild(msgDiv);
      
      setTimeout(() => {
        msgDiv.style.animation = 'slideUp 0.3s ease';
        setTimeout(() => msgDiv.remove(), 300);
      }, 4000);
    }

    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const isSubmitting = ref(false);
        const submitText = ref(defaultConfig.button_text);
        const configState = reactive({ ...defaultConfig });

        const handleLogin = async () => {
          if (!username.value || !password.value) {
            showMessage('Please fill in all fields', 'error');
            return;
          }

          isSubmitting.value = true;
          const originalButtonText = configState.button_text || defaultConfig.button_text;
          submitText.value = 'AUTHENTICATING...';

          try {
            const response = await fetch('/auth/login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                email: username.value,
                password: password.value
              })
            });

            const data = await response.json();

            if (response.ok) {
              showMessage('Login successful! Access granted.', 'success');
              setTimeout(() => {
                window.location.href = '/dashboard';
              }, 1500);
            } else {
              showMessage(data.message || 'Login failed. Invalid credentials.', 'error');
            }
          } catch (error) {
            showMessage('Connection error. Unable to reach server.', 'error');
            console.error('Login error:', error);
          } finally {
            isSubmitting.value = false;
            submitText.value = originalButtonText;
          }
        };

        const onConfigChange = (newConfig) => {
          Object.assign(configState, newConfig);
          submitText.value = configState.button_text || defaultConfig.button_text;
        };

        onMounted(() => {
          if (window.elementSdk) {
            window.elementSdk.init({
              defaultConfig,
              onConfigChange,
              mapToCapabilities: (cfg) => ({
                recolorables: [
                  {
                    get: () => cfg.accent_color || defaultConfig.accent_color,
                    set: (value) => { window.elementSdk.setConfig({ accent_color: value }); }
                  }
                ],
                borderables: [],
                fontEditable: {
                  get: () => cfg.font_family || defaultConfig.font_family,
                  set: (value) => { window.elementSdk.setConfig({ font_family: value }); }
                },
                fontSizeable: {
                  get: () => cfg.font_size || defaultConfig.font_size,
                  set: (value) => { window.elementSdk.setConfig({ font_size: value }); }
                }
              }),
              mapToEditPanelValues: (cfg) => new Map([
                ['main_title', cfg.main_title || defaultConfig.main_title],
                ['subtitle', cfg.subtitle || defaultConfig.subtitle],
                ['user_label', cfg.user_label || defaultConfig.user_label],
                ['password_label', cfg.password_label || defaultConfig.password_label],
                ['button_text', cfg.button_text || defaultConfig.button_text],
                ['footer_text', cfg.footer_text || defaultConfig.footer_text]
              ])
            });
          } else {
            onConfigChange(defaultConfig);
          }
        });

        return {
          username,
          password,
          isSubmitting,
          submitText,
          configState,
          handleLogin
        };
      }
    }).mount('#app');
  </script>
 </body>
</html>
