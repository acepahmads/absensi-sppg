<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi SPPG</title>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1d3a 50%, #0d1b2a 100%);
      position: relative;
    }

    html {
      height: 100%;
      width: 100%;
    }

    .background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 153, 255, 0.08) 0%, transparent 50%);
      z-index: 1;
    }

    .tech-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 102, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 102, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 2;
      opacity: 0.4;
    }

    .main-container {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .access-panel {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 60px 50px;
      width: 100%;
      max-width: 480px;
      box-shadow: 
        0 0 60px rgba(0, 102, 255, 0.3),
        0 20px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 153, 255, 0.2);
      position: relative;
    }

    .shield-icon-container {
      text-align: center;
      margin-bottom: 35px;
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      filter: drop-shadow(0 0 20px rgba(0, 153, 255, 0.6));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .panel-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
    }

    .panel-subtitle {
      font-size: 26px;
      color: rgba(148, 163, 184, 0.9);
      margin: 0;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: block;
      color: rgba(148, 163, 184, 0.9);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .input-field {
      width: 100%;
      height: 52px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(0, 153, 255, 0.3);
      border-radius: 12px;
      padding: 0 20px;
      color: #ffffff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
      box-sizing: border-box;
    }

    .input-field::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .input-field:hover {
      border-color: rgba(0, 153, 255, 0.5);
      background: rgba(30, 41, 59, 0.8);
    }

    .input-field:focus {
      border-color: rgba(0, 153, 255, 0.8);
      background: rgba(30, 41, 59, 0.9);
      box-shadow: 0 0 20px rgba(0, 153, 255, 0.2);
    }

    .password-field {
      letter-spacing: 0.1em;
    }

    .proceed-button {
      width: 100%;
      height: 56px;
      background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 
        0 4px 15px rgba(0, 102, 255, 0.4),
        0 0 20px rgba(0, 102, 255, 0.2);
      margin-top: 32px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .proceed-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 
        0 6px 25px rgba(0, 102, 255, 0.5),
        0 0 30px rgba(0, 102, 255, 0.3);
      background: linear-gradient(135deg, #0073ff 0%, #005ce6 100%);
    }

    .proceed-button:active:not(:disabled) {
      transform: translateY(0);
    }

    .proceed-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .footer-text {
      text-align: center;
      margin-top: 30px;
      color: rgba(148, 163, 184, 0.7);
      font-size: 13px;
    }

    .decorative-line {
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 153, 255, 0.6) 50%, transparent 100%);
    }

    .notification-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      max-width: 90%;
      text-align: center;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      to {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
    }

    @media (max-width: 640px) {
      .access-panel {
        padding: 40px 30px;
      }
      
      .panel-title {
        font-size:32px;
      }
      
      .shield-icon {
        width: 65px;
        height: 65px;
      }
    }
  </style>
  <style>[v-cloak] { display: none; }</style>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
 </head>
 <body>
  <div class="background-overlay"></div>
  <div class="tech-grid"></div>
  <main class="main-container" id="app" v-cloak>
   <div class="access-panel" :style="{
     boxShadow: '0 0 60px ' + (configState.accent_color || '#0066ff') + '4D, 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05)',
     borderColor: (configState.accent_color || '#0066ff') + '33'
   }">
    <div class="decorative-line"></div>
    <div class="shield-icon-container">
      <img src="/static/LOGO-CBI.png" class="shield-icon1" />
    </div>

    <header class="panel-header">
     <h1 class="panel-title" id="mainTitle" :style="{ fontSize: (configState.font_size || 16) * 2 + 'px', color: configState.text_color }">{{ configState.main_title }}</h1>
     <p class="panel-title" id="subtitle2">___________________________________________</p>
     <p class="panel-title" id="subtitle" :style="{ fontSize: (configState.font_size || 16) * 0.94 + 'px', color: configState.subtitle_color }">{{ configState.subtitle }}</p>
     <p class="panel-title" id="subtitle1"></p>
    </header>
    <form id="loginForm" @submit.prevent="handleLogin">
     <div class="input-group">
      <label class="input-label" for="userInput" id="userLabel" :style="{ fontSize: (configState.font_size || 16) * 0.88 + 'px', color: configState.subtitle_color }">{{ configState.user_label }}</label>
      <input type="text" id="userInput" class="input-field" placeholder="Enter your username" v-model="username" required>
     </div>
     <div class="input-group">
      <label class="input-label" for="passwordInput" id="passwordLabel" :style="{ fontSize: (configState.font_size || 16) * 0.88 + 'px', color: configState.subtitle_color }">{{ configState.password_label }}</label>
      <input type="password" id="passwordInput" class="input-field password-field" placeholder="Enter your access code" v-model="password" required>
     </div>
     <button type="submit" class="proceed-button" id="proceedButton" :disabled="isSubmitting" :style="{
       fontSize: (configState.font_size || 16) * 1.06 + 'px',
       background: 'linear-gradient(135deg, ' + (configState.accent_color || '#0066ff') + ' 0%, ' + (configState.accent_color || '#0066ff') + 'CC 100%)',
       boxShadow: '0 4px 15px ' + (configState.accent_color || '#0066ff') + '66, 0 0 20px ' + (configState.accent_color || '#0066ff') + '33'
     }">{{ submitText }}</button>
    </form>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px; font-size: 14px; padding: 0 4px;">
      <a href="/forgot_password" :style="{ color: configState.subtitle_color }" style="text-decoration: none; transition: all 0.3s; opacity: 0.85;" onmouseover="this.style.opacity='1'; this.style.textDecoration='underline'" onmouseout="this.style.opacity='0.85'; this.style.textDecoration='none'">Lupa Password?</a>
      <div style="display: flex; gap: 8px; align-items: center;">
       <a href="/user_registration" :style="{ color: configState.subtitle_color }" style="text-decoration: none; transition: all 0.3s; opacity: 0.85;" onmouseover="this.style.opacity='1'; this.style.textDecoration='underline'" onmouseout="this.style.opacity='0.85'; this.style.textDecoration='none'">Daftar Karyawan</a>
       <span :style="{ color: configState.subtitle_color }" style="opacity: 0.3;">|</span>
       <a href="/tenant_registration" :style="{ color: configState.subtitle_color }" style="text-decoration: none; transition: all 0.3s; opacity: 0.85;" onmouseover="this.style.opacity='1'; this.style.textDecoration='underline'" onmouseout="this.style.opacity='0.85'; this.style.textDecoration='none'">Daftar Tenant</a>
      </div>
     </div>
    <p class="footer-text" id="footerText" :style="{ fontSize: (configState.font_size || 16) * 0.81 + 'px' }">{{ configState.footer_text }}</p>
   </div>
  </main>
  <script>
    const defaultConfig = {
      background_color: '#0a0e27',
      panel_color: '#0f172a',
      accent_color: '#0066ff',
      text_color: '#ffffff',
      subtitle_color: '#94a3b8',
      main_title: 'Login',
      subtitle: 'Absensi SPPG',
      user_label: 'User Identification',
      password_label: 'Access Code',
      button_text: 'Enter System',
      footer_text: 'Protected by advanced security protocols',
      font_family: 'Inter',
      font_size: 16
    };

    // Message notification system
    function showMessage(message, type) {
      const existingMsg = document.querySelector('.notification-message');
      if (existingMsg) {
        existingMsg.remove();
      }
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'notification-message';
      msgDiv.textContent = message;
      msgDiv.style.animation = 'slideDown 0.3s ease';
      
      if (type === 'success') {
        msgDiv.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
        msgDiv.style.color = '#ffffff';
      } else {
        msgDiv.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
        msgDiv.style.color = '#ffffff';
      }
      
      document.body.appendChild(msgDiv);
      
      setTimeout(() => {
        msgDiv.style.animation = 'slideUp 0.3s ease';
        setTimeout(() => msgDiv.remove(), 300);
      }, 4000);
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ background_color: value });
              }
            }
          },
          {
            get: () => config.panel_color || defaultConfig.panel_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ panel_color: value });
              }
            }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ accent_color: value });
              }
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ text_color: value });
              }
            }
          },
          {
            get: () => config.subtitle_color || defaultConfig.subtitle_color,
            set: (value) => {
              if (window.elementSdk) {
                window.elementSdk.setConfig({ subtitle_color: value });
              }
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            if (window.elementSdk) {
              window.elementSdk.setConfig({ font_family: value });
            }
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            if (window.elementSdk) {
              window.elementSdk.setConfig({ font_size: value });
            }
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle],
        ['user_label', config.user_label || defaultConfig.user_label],
        ['password_label', config.password_label || defaultConfig.password_label],
        ['button_text', config.button_text || defaultConfig.button_text],
        ['footer_text', config.footer_text || defaultConfig.footer_text]
      ]);
    }

    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const username = ref('');
        const password = ref('');
        const isSubmitting = ref(false);
        const submitText = ref(defaultConfig.button_text);
        const configState = reactive({ ...defaultConfig });

        const handleLogin = async () => {
          if (!username.value || !password.value) {
            showMessage('Please fill in all fields', 'error');
            return;
          }

          isSubmitting.value = true;
          const originalButtonText = configState.button_text || defaultConfig.button_text;
          submitText.value = 'AUTHENTICATING...';

          try {
            const response = await fetch('/auth/login', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                email: username.value,
                password: password.value
              })
            });

            const data = await response.json();

            if (response.ok) {
              showMessage('Login successful! Access granted.', 'success');
              setTimeout(() => {
                window.location.href = '/dashboard';
              }, 1500);
            } else {
              showMessage(data.message || 'Login failed. Invalid credentials.', 'error');
            }
          } catch (error) {
            showMessage('Connection error. Unable to reach server.', 'error');
            console.error('Login error:', error);
          } finally {
            isSubmitting.value = false;
            submitText.value = originalButtonText;
          }
        };

        const onConfigChange = (newConfig) => {
          Object.assign(configState, newConfig);

          // Apply global non-reactive layout stylings
          const backgroundColor = configState.background_color || defaultConfig.background_color;
          const panelColor = configState.panel_color || defaultConfig.panel_color;
          document.body.style.background = `linear-gradient(135deg, ${backgroundColor} 0%, ${panelColor} 50%, ${backgroundColor} 100%)`;

          const fontFamily = configState.font_family || defaultConfig.font_family;
          const fontStack = `${fontFamily}, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif`;
          document.body.style.fontFamily = fontStack;

          submitText.value = configState.button_text || defaultConfig.button_text;
        };

        onMounted(() => {
          // Initialize SDK
          if (window.elementSdk) {
            window.elementSdk.init({
              defaultConfig,
              onConfigChange,
              mapToCapabilities,
              mapToEditPanelValues
            });
          } else {
            // Apply defaults if SDK not present
            onConfigChange(defaultConfig);
          }
        });

        return {
          username,
          password,
          isSubmitting,
          submitText,
          configState,
          handleLogin
        };
      }
    }).mount('#app');
  </script>
 </body>
</html>
